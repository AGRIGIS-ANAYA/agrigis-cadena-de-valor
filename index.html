<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGRIGIS · Cadena de Valor Cacao</title>
<style>
  :root{
    --green-900:#1a3a1f; --green-700:#2d5a34; --green-600:#3a7247; --green-100:#e8f3ea; --green-50:#f4f9f5;
    --amber-600:#b8860b; --amber-100:#fdf3d9; --red-600:#b3382c; --red-100:#fbe6e3;
    --blue-600:#2b5f8a; --blue-100:#e5eff7; --brown-700:#6b4226; --brown-100:#f0e2d6;
    --gray-900:#232620; --gray-700:#54574f; --gray-500:#82857c; --gray-300:#d7d9d1; --gray-100:#f2f3ef;
    --border:#dcded6; --radius:8px;
  }
  *{box-sizing:border-box;}
  body{margin:0; font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; background:var(--gray-100); color:var(--gray-900);}
  header{background:var(--green-900); color:#fff; padding:12px 20px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;}
  header h1{font-size:16px; margin:0; font-weight:600;}
  header .sub{font-size:11.5px; color:#cfe3d2; margin-top:2px;}
  .predio-bar{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
  select, input, textarea, button{font-family:inherit; font-size:13px;}
  select, input, textarea{padding:7px 9px; border:1px solid var(--border); border-radius:var(--radius); background:#fff; color:var(--gray-900); width:100%;}
  button{padding:8px 12px; border-radius:var(--radius); border:1px solid var(--border); background:#fff; cursor:pointer; color:var(--gray-900);}
  button:hover{background:var(--gray-100);}
  button.primary{background:var(--green-700); color:#fff; border-color:var(--green-700);}
  button.primary:hover{background:var(--green-600);}
  button.danger{color:var(--red-600); border-color:var(--red-100);}
  button.ghost-light{background:transparent; border-color:#4c6b50; color:#fff;}
  .area-bar{display:flex; gap:6px; background:#12281a; padding:6px 16px; flex-wrap:wrap;}
  .area-btn{background:transparent; border:1px solid #365c3d; color:#cfe3d2; font-size:12.5px; padding:7px 12px; text-transform:uppercase; letter-spacing:.02em; font-weight:600;}
  .area-btn.active{background:var(--green-600); color:#fff; border-color:var(--green-600);}
  .layout{display:flex; min-height:calc(100vh - 60px);}
  nav{width:230px; background:#fff; border-right:1px solid var(--border); padding:14px 10px; flex-shrink:0;}
  nav .group-label{font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--gray-500); margin:14px 8px 6px;}
  nav .group-label:first-child{margin-top:2px;}
  nav button.nav-item{width:100%; text-align:left; border:none; background:none; padding:8px 8px; border-radius:var(--radius); font-size:13px; display:flex; justify-content:space-between; align-items:center; margin-bottom:2px;}
  nav button.nav-item:hover{background:var(--green-50);}
  nav button.nav-item.active{background:var(--green-100); color:var(--green-900); font-weight:600;}
  nav .badge{font-size:10px; padding:1px 6px; border-radius:10px; background:var(--gray-100); color:var(--gray-700);}
  main{flex:1; padding:20px 24px; max-width:1150px;}
  .module-head{display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:10px; margin-bottom:14px;}
  .module-head h2{margin:0 0 4px; font-size:19px;}
  .module-head p{margin:0; font-size:13px; color:var(--gray-700); max-width:640px;}
  .toolbar{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px;}
  table{width:100%; border-collapse:collapse; background:#fff; border-radius:var(--radius); overflow:hidden; box-shadow:0 0 0 1px var(--border);}
  th, td{padding:8px 10px; font-size:12.5px; text-align:left; border-bottom:1px solid var(--border); white-space:nowrap; max-width:220px; overflow:hidden; text-overflow:ellipsis;}
  th{background:var(--green-50); color:var(--green-900); font-weight:600; position:sticky; top:0;}
  tr:hover td{background:var(--green-50);}
  .table-wrap{overflow-x:auto; border-radius:var(--radius);}
  .empty{padding:40px 20px; text-align:center; color:var(--gray-500); background:#fff; border-radius:var(--radius); box-shadow:0 0 0 1px var(--border);}
  .actions-cell{display:flex; gap:6px;}
  .actions-cell button{padding:4px 8px; font-size:12px;}
  .modal-overlay{position:fixed; inset:0; background:rgba(20,30,20,.45); display:flex; align-items:flex-start; justify-content:center; padding:30px 14px; overflow-y:auto; z-index:80;}
  .modal{background:#fff; border-radius:12px; width:100%; max-width:640px; padding:20px 24px 24px;}
  .modal.wide{max-width:820px;}
  .modal h3{margin:0 0 4px;}
  .modal .modal-sub{font-size:12px; color:var(--gray-500); margin:0 0 16px;}
  .field-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .field-grid .full{grid-column:1 / -1;}
  .field label{display:block; font-size:12px; color:var(--gray-700); margin-bottom:4px; font-weight:600;}
  .modal-footer{display:flex; justify-content:flex-end; gap:8px; margin-top:18px;}
  .stats-row{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px; margin-bottom:18px;}
  .stat{background:#fff; border-radius:var(--radius); padding:12px 14px; box-shadow:0 0 0 1px var(--border);}
  .stat .n{font-size:20px; font-weight:700; color:var(--green-900);}
  .stat .l{font-size:11.5px; color:var(--gray-500);}
  .filter-row{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px;}
  .filter-row input{width:auto; min-width:140px;}
  .alert{display:flex; gap:8px; align-items:center; border-radius:var(--radius); padding:10px 12px; font-size:12.5px; margin-bottom:8px;}
  .alert.warn{background:var(--amber-100); color:#7a5c05;}
  .alert.danger{background:var(--red-100); color:var(--red-600);}
  .alert.ok{background:var(--green-100); color:var(--green-700);}
  .diag-box{background:var(--blue-100); border-radius:var(--radius); padding:12px; font-size:12.5px; color:var(--blue-600); margin-top:10px; white-space:pre-line;}
  .card{background:#fff; border-radius:var(--radius); box-shadow:0 0 0 1px var(--border); padding:14px; margin-bottom:12px;}
  .doc-row{display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--border);}
  .doc-row:last-child{border-bottom:none;}
  .doc-row .meta{flex:1;}
  .doc-row .meta .name{font-size:12.5px; margin:0;}
  .doc-row .meta .sub{font-size:11px; color:var(--gray-500); margin:0;}
  .mapwrap{position:relative; display:inline-block; max-width:100%; border-radius:var(--radius); overflow:hidden; box-shadow:0 0 0 1px var(--border);}
  .mapwrap img{max-width:100%; display:block;}
  .pin{position:absolute; transform:translate(-50%,-100%); background:var(--green-700); color:#fff; font-size:10px; padding:2px 6px; border-radius:10px; cursor:pointer; white-space:nowrap;}
  .voice-btn{position:fixed; bottom:22px; right:22px; width:58px; height:58px; border-radius:50%; background:var(--green-700); color:#fff; font-size:24px; border:none; box-shadow:0 3px 10px rgba(0,0,0,.3); cursor:pointer; z-index:90;}
  .voice-btn.listening{background:var(--red-600); animation:pulse 1.2s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(179,56,44,.5);}70%{box-shadow:0 0 0 16px rgba(179,56,44,0);}100%{box-shadow:0 0 0 0 rgba(179,56,44,0);}}
  .voice-panel{position:fixed; bottom:90px; right:22px; width:290px; background:#fff; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,.25); padding:14px; z-index:90; font-size:12.5px;}
  .voice-panel .tag{font-size:11px; color:var(--gray-500); margin:0 0 4px;}
  .cfg-row{display:flex; gap:8px; align-items:center; padding:6px 0; border-bottom:1px solid var(--border);}
  .cfg-row span{flex:1; font-size:12.5px;}
  .login-wrap{min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--green-900);}
  .login-card{background:#fff; border-radius:14px; padding:28px 26px; width:320px;}
  .login-card h2{margin:0 0 2px; font-size:17px;}
  .login-card p.sub{font-size:12px; color:var(--gray-500); margin:0 0 18px;}
  .login-card label{font-size:12px; font-weight:600; color:var(--gray-700); display:block; margin-bottom:4px;}
  .login-card input{margin-bottom:12px;}
  .predio-list{max-height:180px; overflow-y:auto; margin-bottom:12px;}
  .predio-list button{width:100%; text-align:left; margin-bottom:4px;}
  .area-card{display:flex; gap:12px; align-items:center; padding:14px; margin-bottom:10px; cursor:pointer;}
  .area-card .ic{font-size:26px;}
  .area-card:hover{background:var(--green-50);}
  .year-tabs{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px;}
  .year-tabs button.active{background:var(--green-700); color:#fff; border-color:var(--green-700);}
  #aqMap{width:100%; height:480px; border-radius:var(--radius); box-shadow:0 0 0 1px var(--border);}
  .weather-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:10px; margin-bottom:14px;}
  .weather-card{background:#fff; border-radius:var(--radius); padding:12px; box-shadow:0 0 0 1px var(--border);}
  .weather-card .l{font-size:11px; color:var(--gray-500);}
  .weather-card .v{font-size:18px; font-weight:700; color:var(--green-900);}
  .spray-bar{height:8px; border-radius:4px; background:linear-gradient(90deg,#4caf50,#f2c94c,#e05a4d); margin:6px 0;}
  .aq-toolbar{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px;}
  .aq-list{max-height:180px; overflow-y:auto;}
  @media (max-width:820px){
    .layout{flex-direction:column;}
    nav{width:100%; border-right:none; border-bottom:1px solid var(--border); display:flex; overflow-x:auto; padding:8px;}
    nav .group-label{display:none;}
    nav button.nav-item{white-space:nowrap; width:auto; margin-right:4px;}
    .field-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<div id="authScreen" class="login-wrap">
  <div class="login-card">
    <h2>AGRIGIS · Cadena de Valor</h2>
    <p class="sub">Ingresa con la cuenta que te compartieron</p>
    <label>Correo electrónico</label>
    <input type="email" id="authEmail" placeholder="tucorreo@ejemplo.com">
    <label>Contraseña</label>
    <input type="password" id="authPassword" placeholder="••••••••">
    <div id="authError" style="display:none; color:var(--red-600); font-size:12px; margin-bottom:10px;"></div>
    <button class="primary" id="btnAuthLogin" style="width:100%;">Entrar</button>
    <p style="font-size:11px; color:var(--gray-500); margin-top:10px;">El acceso es solo por invitación. Si no tienes cuenta, contacta al administrador.</p>
  </div>
</div>

<div id="loginScreen" class="login-wrap" style="display:none;">
  <div class="login-card">
    <h2>Completa tu perfil</h2>
    <p class="sub">Solo la primera vez que ingresas</p>
    <label>Nombre de usuario</label>
    <input type="text" id="loginNombre" placeholder="Ej. Esteban Anaya">
    <label>DNI</label>
    <input type="text" id="loginDni" placeholder="Ej. 12345678">
    <label>Código de predio / empresa</label>
    <input type="text" id="loginPredio" placeholder="Ej. FUNDO-ANAYA">
    <label>Área del predio (ha) — opcional</label>
    <input type="text" id="loginArea" placeholder="Ej. 3.4635">
    <label>Institución / empresa que te contrató — opcional</label>
    <input type="text" id="loginInstitucion" placeholder="Ej. AGRIGIS, Cooperativa APACOFA">
    <label>Proyecto / línea de cultivo — opcional</label>
    <input type="text" id="loginProyecto" placeholder="Ej. Cacao, Café, Camu Camu">
    <div id="prediosListWrap"></div>
    <button class="primary" id="btnLogin" style="width:100%;">Guardar y continuar</button>
    <p style="font-size:11px; color:var(--gray-500); margin-top:10px;">Esto identifica tus registros dentro de tu cuenta.</p>
  </div>
</div>

<div id="appScreen" style="display:none;">
<header>
  <div>
    <h1 id="headerTitle">AGRIGIS</h1>
    <div class="sub" id="predioSub">Cargando…</div>
  </div>
  <div class="predio-bar">
    <span id="syncStatus" style="font-size:11px; color:#cfe3d2;"></span>
    <button class="ghost-light" id="btnBackup">Respaldo JSON</button>
    <button class="ghost-light" id="btnRestore">Importar JSON</button>
    <input type="file" id="fileRestore" accept="application/json" style="display:none;">
    <button class="ghost-light" id="btnLogout">Cerrar sesión</button>
  </div>
</header>
<div class="area-bar" id="areaBar"></div>
<div class="layout">
  <nav id="navList"></nav>
  <main id="mainArea"></main>
</div>
</div>

<div id="modalArea"></div>
<button class="voice-btn" id="voiceBtn" title="Asistente de voz">&#127908;</button>

/* ================= Utilidades y estado ================= */
function slug(s){return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,"");}
function todayISO(){return new Date().toISOString().slice(0,10);}
function daysSince(dateStr){ if(!dateStr) return null; const d=new Date(dateStr); if(isNaN(d)) return null; return Math.floor((Date.now()-d.getTime())/86400000); }

/* ================= Supabase: conexión y sincronización ================= */
const SUPABASE_URL = "https://ldsencyeydodpgtmddji.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_OQd40jQcb-4OIryN8IaKHQ_k9GCdejW";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let sbUser = null; // usuario autenticado actual
let syncQueueTimer = null;

function setSyncStatus(text){
  const el = document.getElementById("syncStatus");
  if(el) el.textContent = text;
}

/* Envía (o actualiza) una clave de localStorage hacia Supabase.
   Se ejecuta en segundo plano; si no hay internet, simplemente falla
   en silencio y los datos quedan a salvo en el celular. */
async function syncPush(key, rawValue){
  if(!sbUser) return;
  if(!key || key.indexOf("agrigis_")!==0) return; // solo sincronizamos datos de la app
  try{
    setSyncStatus("Sincronizando…");
    const { error } = await sb.from("agrigis_kv").upsert({
      user_id: sbUser.id,
      predio: getCurrentPredio() || "SIN-PREDIO",
      data_key: key,
      value: rawValue,
      updated_at: new Date().toISOString()
    }, { onConflict: "user_id,data_key" });
    setSyncStatus(error ? "Sin conexión (guardado solo en el celular)" : "Sincronizado ✓");
  }catch(e){
    setSyncStatus("Sin conexión (guardado solo en el celular)");
  }
}

/* Trae todos los datos del usuario autenticado desde Supabase
   y los coloca en localStorage ANTES de dibujar la app, para que
   sirvan tanto si entra desde el celular como desde la PC. */
async function syncPullAll(){
  if(!sbUser) return;
  try{
    setSyncStatus("Descargando tus datos…");
    const { data, error } = await sb.from("agrigis_kv").select("data_key, value").eq("user_id", sbUser.id);
    if(!error && data){
      data.forEach(row=>{
        try{
          const toStore = (typeof row.value === "string") ? row.value : JSON.stringify(row.value);
          localStorage.setItem(row.data_key, toStore);
        }catch(e){}
      });
    }
    setSyncStatus("Sincronizado ✓");
  }catch(e){
    setSyncStatus("Sin conexión (usando datos guardados en el celular)");
  }
}

/* Envuelve localStorage.setItem para que CADA guardado local
   (registros, fotos, documentos, sectores, waypoints, etc.)
   también se intente enviar a Supabase automáticamente. */
(function wrapLocalStorage(){
  const originalSetItem = localStorage.setItem.bind(localStorage);
  localStorage.setItem = function(key, value){
    originalSetItem(key, value);
    syncPush(key, value);
  };
})();

async function saveCloudProfile(nombre, dni, predio, area_ha, institucion, proyecto){
  if(!sbUser) return;
  await sb.from("agrigis_perfiles").upsert({
    user_id: sbUser.id, nombre, dni, predio, area_ha,
    institucion: institucion || "AGRIGIS", proyecto: proyecto || "General"
  }, { onConflict: "user_id" });
}

/* ---- Flujo de autenticación ---- */
async function iniciarSesionUI(){
  document.getElementById("authScreen").style.display = "none";
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("appScreen").style.display = "none";
  await syncPullAll();
  const perfil = await getCloudProfile();
  if(perfil && perfil.predio){
    currentUserName = perfil.nombre || "";
    localStorage.setItem("agrigis_last_user", currentUserName);
    let predios = getPredios();
    if(!predios.includes(perfil.predio)){ predios.push(perfil.predio); setPredios(predios); }
    setCurrentPredio(perfil.predio);
    setPredioProfile(perfil.predio, {nombre: perfil.nombre, dni: perfil.dni, area: perfil.area_ha, institucion: perfil.institucion, proyecto: perfil.proyecto});
    if(perfil.predio.toUpperCase().replace(/[^A-Z0-9]/g,"")==="FUNDOANAYA"){ seedFundoAnayaIfNeeded(); }
    document.getElementById("appScreen").style.display = "block";
    currentArea="campo"; currentModuleId="inicio";
    renderAll();
  } else {
    document.getElementById("loginScreen").style.display = "flex";
    refreshPrediosListLogin();
  }
}

document.getElementById("btnAuthLogin").onclick = async ()=>{
  const email = document.getElementById("authEmail").value.trim();
  const password = document.getElementById("authPassword").value;
  const errEl = document.getElementById("authError");
  errEl.style.display = "none";
  if(!email || !password){ errEl.textContent = "Ingresa tu correo y contraseña."; errEl.style.display="block"; return; }
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if(error){ errEl.textContent = "Correo o contraseña incorrectos."; errEl.style.display="block"; return; }
  sbUser = data.user;
  await iniciarSesionUI();
};

document.getElementById("btnLogout").onclick = async ()=>{
  await sb.auth.signOut();
  sbUser = null;
  document.getElementById("appScreen").style.display = "none";
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("authScreen").style.display = "flex";
  document.getElementById("authEmail").value = "";
  document.getElementById("authPassword").value = "";
};

/* Al cargar la página: si ya había una sesión activa, entra directo */
(async function checkExistingSession(){
  const { data } = await sb.auth.getSession();
  if(data && data.session && data.session.user){
    sbUser = data.session.user;
    await iniciarSesionUI();
  }
})();

function getPredios(){return JSON.parse(localStorage.getItem("agrigis_predios")||"[]");}
function setPredios(list){localStorage.setItem("agrigis_predios", JSON.stringify(list));}
function getCurrentPredio(){return localStorage.getItem("agrigis_current_predio")||"";}
function setCurrentPredio(name){localStorage.setItem("agrigis_current_predio", name);}
function getPredioProfile(name){ return JSON.parse(localStorage.getItem("agrigis_profile_"+slug(name))||"{}"); }
function setPredioProfile(name, profile){ localStorage.setItem("agrigis_profile_"+slug(name), JSON.stringify(profile)); }

function pKey(base){return "agrigis_"+slug(getCurrentPredio())+"_"+base;}
function storageKey(areaId, moduleId){return pKey(areaId+"_mod_"+moduleId);}
function getRecords(moduleId){return JSON.parse(localStorage.getItem(storageKey(currentArea, moduleId))||"[]");}
function saveRecords(moduleId, records){localStorage.setItem(storageKey(currentArea, moduleId), JSON.stringify(records));}

function getFields(moduleId){
  const override = localStorage.getItem(pKey(currentArea+"_fields_"+moduleId));
  if(override) return JSON.parse(override);
  return AREAS[currentArea].modules.find(m=>m.id===moduleId).fields;
}
function setFields(moduleId, fields){ localStorage.setItem(pKey(currentArea+"_fields_"+moduleId), JSON.stringify(fields)); }
function resetFields(moduleId){ localStorage.removeItem(pKey(currentArea+"_fields_"+moduleId)); }

function getSectores(){ return JSON.parse(localStorage.getItem(pKey("sectores"))||"[]"); }
function setSectores(list){ localStorage.setItem(pKey("sectores"), JSON.stringify(list)); }
function getAgromapaImg(){ return localStorage.getItem(pKey("agromapa_img"))||""; }
function setAgromapaImg(dataUrl){ localStorage.setItem(pKey("agromapa_img"), dataUrl); }
function getDocs(){ return JSON.parse(localStorage.getItem(pKey(currentArea+"_docs"))||"[]"); }
function setDocs(list){ localStorage.setItem(pKey(currentArea+"_docs"), JSON.stringify(list)); }

function seedFundoAnayaIfNeeded(){
  try{
    const seedEl = document.getElementById("seedData");
    const seed = JSON.parse(seedEl.textContent);
    const savedArea = currentArea; currentArea="campo";
    Object.keys(seed).forEach(moduleId=>{
      const existing = getRecords(moduleId);
      const existingSeedIds = new Set(existing.filter(r=>String(r.id).startsWith("seed_"+moduleId+"_")).map(r=>r.id));
      const toAdd = [];
      seed[moduleId].forEach((r,i)=>{
        const seedId = "seed_"+moduleId+"_"+i;
        if(!existingSeedIds.has(seedId)) toAdd.push({id:seedId, ...r});
      });
      if(toAdd.length>0){ saveRecords(moduleId, existing.concat(toAdd)); }
    });
    currentArea = savedArea;
  }catch(e){ console.error("Error migrando datos semilla:", e); }
}

/* ================= Diagnóstico de suelo — motor de reglas ampliado por cultivo ================= */
function diagnosticoSuelo(r){
  const cultivo = (r.cultivo||"").toUpperCase();
  const ph = parseFloat(r.ph);
  const n = parseFloat(r.nitrogeno), p = parseFloat(r.fosforo), k = parseFloat(r.potasio);
  const cond = parseFloat(r.conductividad);
  let ref = {rangoPh:[6.0,7.0], nOk:25, pOk:15, kOk:20, notaCultivo:""};
  if(cultivo.includes("CAMU")) ref = {rangoPh:[4.5,6.5], nOk:20, pOk:12, kOk:18, notaCultivo:"El camu camu tolera acidez, pero es exigente en potasio para producción de fruto."};
  if(cultivo.includes("CACAO")) ref = {rangoPh:[6.0,7.5], nOk:25, pOk:15, kOk:20, notaCultivo:"El cacao rinde mejor con buena disponibilidad de Ca y Mg además de N-P-K; considera un análisis de bases si el rendimiento no mejora con fertilización N-P-K sola."};
  if(cultivo.includes("CITR")) ref = {rangoPh:[6.0,7.5], nOk:25, pOk:15, kOk:20, notaCultivo:""};
  if(cultivo.includes("MARACUY")) ref = {rangoPh:[5.5,6.5], nOk:30, pOk:18, kOk:25, notaCultivo:"El maracuyá es exigente en potasio durante la fase de fructificación."};

  let lineas = [];
  if(!isNaN(ph)){
    if(ph < ref.rangoPh[0]) lineas.push(`• pH ${ph} (ácido) — por debajo del rango óptimo ${ref.rangoPh[0]}–${ref.rangoPh[1]} para ${cultivo||"este cultivo"}. Recomendación: encalado gradual (cal agrícola o dolomita) o incorporación de materia orgánica madura; volver a medir en 60-90 días.`);
    else if(ph > ref.rangoPh[1]) lineas.push(`• pH ${ph} (alcalino) — por encima del rango óptimo ${ref.rangoPh[0]}–${ref.rangoPh[1]}. Recomendación: materia orgánica ácida (compost de cáscara, mulch) o azufre agrícola en dosis bajas.`);
    else lineas.push(`• pH ${ph} — dentro del rango adecuado para ${cultivo||"este cultivo"}.`);
  } else lineas.push("• pH no registrado — sin este dato no se puede evaluar disponibilidad de nutrientes con precisión.");

  if(!isNaN(n)){
    if(n < ref.nOk) lineas.push(`• Nitrógeno bajo (${n}) — refuerza con abono orgánico nitrogenado (biol, guano, compost) fraccionado en 2-3 aplicaciones durante la fase vegetativa.`);
    else lineas.push(`• Nitrógeno (${n}) en nivel adecuado.`);
  }
  if(!isNaN(p)){
    if(p < ref.pOk) lineas.push(`• Fósforo bajo (${p}) — considera roca fosfórica o compost maduro rico en P; el fósforo es clave en floración y desarrollo radicular.`);
    else lineas.push(`• Fósforo (${p}) en nivel adecuado.`);
  }
  if(!isNaN(k)){
    if(k < ref.kOk) lineas.push(`• Potasio bajo (${k}) — ceniza vegetal o fuentes orgánicas de K; especialmente crítico en llenado de fruto.`);
    else lineas.push(`• Potasio (${k}) en nivel adecuado.`);
  }
  if(!isNaN(cond)){
    if(cond > 2) lineas.push(`• Conductividad eléctrica alta (${cond}) — posible acumulación de sales; evalúa lavado con riego abundante si el cultivo muestra estrés.`);
  }
  if(ref.notaCultivo) lineas.push("• Nota agronómica: "+ref.notaCultivo);
  lineas.push("\n(Diagnóstico referencial por motor de reglas — no reemplaza un análisis certificado de laboratorio ni el criterio de un ingeniero agrónomo en campo.)");
  return lineas.join("\n");
}

<script>
/* ================= Barra de áreas y navegación ================= */
function renderPredioBar(){
  const prof = getPredioProfile(getCurrentPredio());
  document.getElementById("headerTitle").textContent = "AGRIGIS · " + AREAS[currentArea].label;
  document.getElementById("predioSub").textContent =
    `Usuario: ${prof.nombre||currentUserName||""} ${prof.dni?"(DNI "+prof.dni+")":""} · Predio: ${getCurrentPredio()} ${prof.area?"· "+prof.area+" ha":""}`;
}

function renderAreaBar(){
  const bar = document.getElementById("areaBar");
  bar.innerHTML = AREA_ORDER.map(a=>`<button class="area-btn ${a===currentArea?"active":""}" data-a="${a}">${AREAS[a].label}</button>`).join("");
  bar.querySelectorAll("button[data-a]").forEach(btn=>{
    btn.onclick = ()=>{ currentArea = btn.dataset.a; currentModuleId="inicio"; renderAll(); };
  });
}

function renderNav(){
  const nav = document.getElementById("navList");
  const area = AREAS[currentArea];
  if(area.isMapTool){
    nav.innerHTML = `<button class="nav-item active" data-id="inicio"><span>MAPA Y CLIMA</span></button>
      <div class="group-label">Herramientas</div>
      <button class="nav-item ${currentModuleId==="config"?"active":""}" data-id="config"><span>CONFIGURACIÓN</span></button>`;
    nav.querySelectorAll(".nav-item").forEach(btn=>{
      btn.onclick = ()=>{ currentModuleId = btn.dataset.id; renderAll(); };
    });
    return;
  }
  let html = `<button class="nav-item ${currentModuleId==="inicio"?"active":""}" data-id="inicio"><span>INICIO</span></button>`;
  area.groups.forEach(g=>{
    html += `<div class="group-label">${g}</div>`;
    area.modules.filter(m=>m.group===g).forEach(m=>{
      const count = getRecords(m.id).length;
      html += `<button class="nav-item ${m.id===currentModuleId?"active":""}" data-id="${m.id}">
        <span>${m.name}</span><span class="badge">${count}</span></button>`;
    });
  });
  html += `<div class="group-label">Herramientas</div>`;
  let tools = [];
  if(area.hasAgromapa) tools.push(["agromapa","AGROMAPA"]);
  let docsLabel = "DOCUMENTOS";
  if(currentArea==="agritec") docsLabel = "INFORMES MENSUALES";
  if(currentArea==="transformacion") docsLabel = "DOCUMENTOS Y RECONOCIMIENTOS";
  tools.push(["documentos",docsLabel]);
  tools.push(["historial_reg","HISTORIAL DE REGISTROS"]);
  if(area.hasHistorial) tools.push(["historial_campo","HISTORIAL DE CAMPO (POR AÑOS)"]);
  tools.push(["config","CONFIGURACIÓN"]);
  tools.forEach(([id,label])=>{
    html += `<button class="nav-item ${id===currentModuleId?"active":""}" data-id="${id}"><span>${label}</span></button>`;
  });
  nav.innerHTML = html;
  nav.querySelectorAll(".nav-item").forEach(btn=>{
    btn.onclick = ()=>{ currentModuleId = btn.dataset.id; renderAll(); };
  });
}

function renderAll(){
  renderPredioBar();
  renderAreaBar();
  renderNav();
  const main = document.getElementById("mainArea");
  if(currentArea==="agriquest" && currentModuleId!=="config"){ renderAgriQuest(main); return; }
  if(currentModuleId==="inicio") renderInicio(main);
  else if(currentModuleId==="agromapa") renderAgromapa(main);
  else if(currentModuleId==="documentos") renderDocumentos(main);
  else if(currentModuleId==="historial_reg") renderHistorialRegistros(main);
  else if(currentModuleId==="historial_campo") renderHistorialCampo(main);
  else if(currentModuleId==="config") renderConfig(main);
  else renderModuleView(main, currentModuleId);
}

/* ================= Inicio ================= */
function renderInicio(main){
  const area = AREAS[currentArea];
  const total = area.modules.reduce((a,m)=>a+getRecords(m.id).length,0);
  let alerts = [];
  area.modules.forEach(m=>{
    const recs = getRecords(m.id);
    const dates = recs.map(r=>r.fecha).filter(Boolean).sort();
    const last = dates[dates.length-1];
    const dias = daysSince(last);
    const umbral = (area.alertDays||{})[m.id];
    if(recs.length===0){ alerts.push({level:"danger", text:`${m.name}: aún no tiene ningún registro.`}); }
    else if(umbral && dias!==null && dias>umbral){ alerts.push({level:"warn", text:`${m.name}: sin registros hace ${dias} días (revisar cada ${umbral} días aprox.).`}); }
  });
  let html = `<div class="module-head"><div><h2>Inicio — ${area.label}</h2><p>Resumen de esta área y alertas de registros pendientes.</p></div></div>`;
  html += `<div class="stats-row">
    <div class="stat"><div class="n">${total}</div><div class="l">Registros totales en esta área</div></div>
    <div class="stat"><div class="n">${area.modules.length}</div><div class="l">Módulos / fichas</div></div>
  </div>`;
  html += `<div class="card"><b>Alertas de registro</b><div style="margin-top:10px;">`;
  html += alerts.length===0 ? `<div class="alert ok">Todo al día en esta área.</div>` : alerts.map(a=>`<div class="alert ${a.level}">${a.text}</div>`).join("");
  html += `</div></div>`;
  main.innerHTML = html;
}

/* ================= Vista de módulo ================= */
let currentFilterText = "";
function renderModuleView(main, moduleId){
  const m = AREAS[currentArea].modules.find(x=>x.id===moduleId);
  const fields = getFields(moduleId);
  main.innerHTML = `
    <div class="module-head">
      <div><h2>${m.name}</h2><p>${m.desc}</p></div>
      <div class="toolbar">
        <button id="btnExportExcel">Excel</button>
        <button id="btnExportPdf">PDF</button>
        <button id="btnExportPng">Imagen</button>
        <button class="primary" id="btnNewRecord">+ Nuevo registro</button>
      </div>
    </div>
    <div class="filter-row"><input type="text" id="searchBox" placeholder="Buscar en este módulo..." value="${currentFilterText}"></div>
    <div id="tableArea"></div>`;
  document.getElementById("searchBox").oninput = (e)=>{ currentFilterText=e.target.value; renderTable(moduleId, fields); };
  document.getElementById("btnNewRecord").onclick = ()=> openModal(moduleId, null);
  document.getElementById("btnExportExcel").onclick = ()=> exportModuleExcel(moduleId);
  document.getElementById("btnExportPdf").onclick = ()=> exportModulePdf(moduleId);
  document.getElementById("btnExportPng").onclick = ()=> exportModulePng(moduleId);
  renderTable(moduleId, fields);
}

function renderTable(moduleId, fields){
  let records = getRecords(moduleId);
  if(currentFilterText.trim()!==""){
    const q = currentFilterText.toLowerCase();
    records = records.filter(r => Object.values(r).some(v => String(v||"").toLowerCase().includes(q)));
  }
  const area = document.getElementById("tableArea");
  if(!area) return;
  if(records.length===0){ area.innerHTML = `<div class="empty">Aún no hay registros en este módulo.<br>Usa "+ Nuevo registro" para empezar.</div>`; return; }
  records = records.slice().sort((a,b)=> (b.fecha||"").localeCompare(a.fecha||""));
  const showDiag = AREAS[currentArea].hasDiag && moduleId==="suelo";
  let thead = "<tr>" + fields.map(f=>`<th>${f.l}</th>`).join("") + (showDiag?"<th>Diagnóstico</th>":"") + "<th>Acciones</th></tr>";
  let rows = records.map(r=>{
    let cells = fields.map(f=>`<td>${(r[f.k]||"").toString()}</td>`).join("");
    let diagCell = showDiag ? `<td><button data-act="diag" data-id="${r.id}">Ver</button></td>` : "";
    return `<tr>${cells}${diagCell}<td class="actions-cell">
      <button data-act="edit" data-id="${r.id}">Editar</button>
      <button data-act="del" data-id="${r.id}" class="danger">Borrar</button>
      </td></tr>`;
  }).join("");
  area.innerHTML = `<div class="table-wrap" id="exportTarget"><table><thead>${thead}</thead><tbody>${rows}</tbody></table></div>`;
  area.querySelectorAll("button[data-act]").forEach(btn=>{
    btn.onclick = ()=>{
      const id = btn.dataset.id;
      if(btn.dataset.act==="edit") openModal(moduleId, id);
      else if(btn.dataset.act==="diag"){
        const rec = getRecords(moduleId).find(x=>x.id===id);
        alert("Diagnóstico automático:\n\n"+diagnosticoSuelo(rec));
      } else {
        if(confirm("¿Borrar este registro? No se puede deshacer.")){
          saveRecords(moduleId, getRecords(moduleId).filter(x=>x.id!==id));
          renderAll();
        }
      }
    };
  });
}

/* ---- Exportar Excel (con ancho de columna automático) ---- */
function exportModuleExcel(moduleId){
  const fields = getFields(moduleId);
  const records = getRecords(moduleId);
  const modName = AREAS[currentArea].modules.find(x=>x.id===moduleId).name;
  const prof = getPredioProfile(getCurrentPredio());
  const wsData = [];
  wsData.push([ "FUNDO / EMPRESA:", getCurrentPredio() ]);
  wsData.push([ "PROPIETARIO / RESPONSABLE:", prof.nombre||"", "DNI:", prof.dni||"" ]);
  wsData.push([ "ÁREA:", AREAS[currentArea].label ]);
  wsData.push([ "FICHA:", modName, "GENERADO:", todayISO() ]);
  wsData.push([]);
  wsData.push(fields.map(f=>f.l));
  records.forEach(r=> wsData.push(fields.map(f=> r[f.k]||"")));
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols'] = fields.map(f=>({wch: Math.max(f.l.length+2, 16)}));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, modName.slice(0,31));
  XLSX.writeFile(wb, `${getCurrentPredio()}_${modName}.xlsx`);
}

/* ---- Exportar PDF (tabla simple con jsPDF) ---- */
function exportModulePdf(moduleId){
  const { jsPDF } = window.jspdf;
  const fields = getFields(moduleId);
  const records = getRecords(moduleId).slice().sort((a,b)=>(b.fecha||"").localeCompare(a.fecha||""));
  const modName = AREAS[currentArea].modules.find(x=>x.id===moduleId).name;
  const prof = getPredioProfile(getCurrentPredio());
  const doc = new jsPDF({orientation:"portrait", unit:"pt"});
  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();
  const marginX = 40; let y = 44;

  function drawPageHeader(){
    y = 44;
    doc.setFontSize(13); doc.setFont(undefined,"bold"); doc.text(`FUNDO / EMPRESA: ${getCurrentPredio()}`, marginX, y); y+=16;
    doc.setFontSize(9.5); doc.setFont(undefined,"normal");
    doc.text(`Propietario/Responsable: ${prof.nombre||""}   DNI: ${prof.dni||""}`, marginX, y); y+=13;
    doc.text(`Área: ${AREAS[currentArea].label}`, marginX, y); y+=13;
    doc.setFont(undefined,"bold"); doc.text(`FICHA: ${modName}`, marginX, y); doc.setFont(undefined,"normal"); y+=13;
    doc.setFontSize(8); doc.setTextColor(120); doc.text(`Generado: ${todayISO()}`, marginX, y); doc.setTextColor(0); y+=18;
    doc.setDrawColor(180); doc.line(marginX, y, pageW-marginX, y); y+=16;
  }
  drawPageHeader();

  const labelW = 150;
  const valueW = pageW - marginX*2 - labelW - 10;

  records.forEach((r, idx)=>{
    // calcular altura necesaria para este registro
    let lines = fields.map(f=> doc.splitTextToSize(String(r[f.k]||"—"), valueW));
    let blockHeight = lines.reduce((sum,l)=> sum + Math.max(l.length,1)*11, 0) + 18;
    if(y + blockHeight > pageH - 40){ doc.addPage(); drawPageHeader(); }

    doc.setFontSize(9.5); doc.setFont(undefined,"bold");
    doc.text(`Registro ${idx+1}`, marginX, y); y+=13;
    doc.setFont(undefined,"normal");
    fields.forEach((f,fi)=>{
      doc.setFont(undefined,"bold"); doc.setFontSize(8.5);
      doc.text(String(f.l)+":", marginX, y);
      doc.setFont(undefined,"normal");
      const vLines = lines[fi];
      doc.text(vLines, marginX+labelW, y);
      y += Math.max(vLines.length,1)*11;
    });
    y += 10;
    doc.setDrawColor(225); doc.line(marginX, y-4, pageW-marginX, y-4);
  });
  doc.save(`${getCurrentPredio()}_${modName}.pdf`);
}

/* ---- Exportar imagen PNG (con encabezado FUNDO/PROPIETARIO/FICHA) ---- */
function exportModulePng(moduleId){
  const target = document.getElementById("exportTarget");
  if(!target){ alert("No hay registros para exportar como imagen."); return; }
  const modName = AREAS[currentArea].modules.find(x=>x.id===moduleId).name;
  const prof = getPredioProfile(getCurrentPredio());
  const wrapper = document.createElement("div");
  wrapper.style.background = "#ffffff"; wrapper.style.padding = "16px"; wrapper.style.width = target.scrollWidth+32+"px";
  wrapper.innerHTML = `<div style="font-family:sans-serif; margin-bottom:10px;">
    <div style="font-weight:700; font-size:15px; color:#1a3a1f;">FUNDO / EMPRESA: ${getCurrentPredio()}</div>
    <div style="font-size:12px; color:#333;">Propietario/Responsable: ${prof.nombre||""} ${prof.dni?"— DNI: "+prof.dni:""}</div>
    <div style="font-size:12px; color:#333;">Área: ${AREAS[currentArea].label}</div>
    <div style="font-weight:700; font-size:13px; margin-top:4px;">FICHA: ${modName}</div>
    <div style="font-size:11px; color:#777;">Generado: ${todayISO()}</div>
  </div>`;
  const clone = target.cloneNode(true);
  wrapper.appendChild(clone);
  wrapper.style.position = "fixed"; wrapper.style.left = "-9999px"; wrapper.style.top = "0";

  html2canvas(wrapper, {backgroundColor:"#ffffff", scale:2}).then(canvas=>{

<script>
/* ================= Modal de registro ================= */
let editingRecordId = null;
function openModal(moduleId, recordId, prefill){
  const m = AREAS[currentArea].modules.find(x=>x.id===moduleId);
  const fields = getFields(moduleId);
  editingRecordId = recordId || null;
  let record = prefill || {};
  if(editingRecordId){ record = getRecords(moduleId).find(r=>r.id===editingRecordId) || {}; }
  else if(moduleId==="at_visita"){
    const prof = getPredioProfile(getCurrentPredio());
    record = Object.assign({
      institucion: prof.institucion||"", proyecto: prof.proyecto||"",
      tecnico: currentUserName||"", dni_tecnico: prof.dni||""
    }, record);
  }
  const sectores = getSectores();

  let fieldsHtml = fields.map(f=>{
    const val = record[f.k]||"";
    let input = "";
    if(f.k==="sector" && sectores.length>0){
      input = `<select data-k="${f.k}"><option value="">-- Seleccionar --</option>` +
        sectores.map(s=>`<option value="${s.codigo}" ${s.codigo===val?"selected":""}>${s.codigo}${s.nota?" — "+s.nota:""}</option>`).join("") +
        `<option value="__otro__">Otro (escribir)</option></select>
        <input type="text" data-k="${f.k}_libre" placeholder="Escribir sector si no está en la lista" style="margin-top:4px; display:none;">`;
    } else if(f.k==="gps"){
      input = `<div style="display:flex; gap:6px;"><input type="text" data-k="${f.k}" value="${val}" placeholder="lat, lng" style="flex:1;">
        <button type="button" id="btnCapturarGps">Capturar ubicación</button></div>
        <div id="gpsMapLink" style="margin-top:4px;">${val?`<a href="https://www.google.com/maps?q=${val}" target="_blank">Ver en Google Maps</a>`:""}</div>`;
    } else if(f.t==="photo"){
      input = `<input type="file" data-k="${f.k}" accept="image/*" capture="environment">
        <div id="photoPreview" style="margin-top:6px;">${val?`<img src="${val}" style="max-width:160px; border-radius:6px;">`:""}</div>`;
    } else if(f.t==="textarea"){
      input = `<textarea data-k="${f.k}" rows="2">${val}</textarea>`;
    } else if(f.t==="select"){
      input = `<select data-k="${f.k}"><option value="">-- Seleccionar --</option>` +
        f.o.map(o=>`<option value="${o}" ${o===val?"selected":""}>${o}</option>`).join("") + `</select>`;
    } else {
      input = `<input type="${f.t}" data-k="${f.k}" value="${val}">`;
    }
    return `<div class="field ${f.full?"full":""}"><label>${f.l}</label>${input}</div>`;
  }).join("");

  document.getElementById("modalArea").innerHTML = `
    <div class="modal-overlay" id="overlay">
      <div class="modal">
        <h3>${editingRecordId?"Editar registro":"Nuevo registro"}</h3>
        <p class="modal-sub">${m.name} · ${getCurrentPredio()}</p>
        <div class="field-grid">${fieldsHtml}</div>
        <div class="modal-footer">
          <button id="btnVolver">← Volver</button>
          <button class="primary" id="btnSave">Guardar</button>
        </div>
      </div>
    </div>`;
  const selSector = document.querySelector('[data-k="sector"]');
  if(selSector && selSector.tagName==="SELECT"){
    selSector.addEventListener("change", ()=>{
      const libre = document.querySelector('[data-k="sector_libre"]');
      if(libre) libre.style.display = selSector.value==="__otro__" ? "block":"none";
    });
  }
  const btnGps = document.getElementById("btnCapturarGps");
  if(btnGps){
    btnGps.onclick = ()=>{
      if(!navigator.geolocation){ alert("Tu navegador no soporta GPS."); return; }
      btnGps.textContent = "Buscando...";
      navigator.geolocation.getCurrentPosition(pos=>{
        const coords = pos.coords.latitude.toFixed(6)+", "+pos.coords.longitude.toFixed(6);
        document.querySelector('[data-k="gps"]').value = coords;
        document.getElementById("gpsMapLink").innerHTML = `<a href="https://www.google.com/maps?q=${coords}" target="_blank">Ver en Google Maps</a>`;
        btnGps.textContent = "Capturar ubicación";
      }, err=>{ alert("No se pudo obtener ubicación: "+err.message); btnGps.textContent="Capturar ubicación"; });
    };
  }
  document.getElementById("btnVolver").onclick = closeModal;
  document.getElementById("overlay").addEventListener("click", (e)=>{ if(e.target.id==="overlay") closeModal(); });
  document.getElementById("btnSave").onclick = ()=>{
    let newRecord = editingRecordId ? {...record} : {id: "r"+Date.now()+Math.random().toString(36).slice(2,7)};
    const photoInput = document.querySelector('input[type="file"][data-k]');
    function finishSave(){
      document.querySelectorAll("[data-k]").forEach(inp=>{
        if(inp.type==="file") return;
        if(inp.dataset.k.endsWith("_libre")) return;
        let val = inp.value;
        if(val==="__otro__"){
          const libre = document.querySelector(`[data-k="${inp.dataset.k}_libre"]`);
          val = libre ? libre.value : "";
        }
        newRecord[inp.dataset.k] = val;
      });
      let recs = getRecords(moduleId);
      if(editingRecordId){ recs = recs.map(r=> r.id===editingRecordId ? newRecord : r); }
      else { recs.push(newRecord); }
      saveRecords(moduleId, recs);
      if(AREAS[currentArea].hasDiag && moduleId==="suelo"){
        alert("Registro guardado.\n\nDiagnóstico automático:\n"+diagnosticoSuelo(newRecord));
      }
      closeModal();
      renderAll();
    }
    if(photoInput && photoInput.files[0]){
      const reader = new FileReader();
      reader.onload = (ev)=>{
        const img = new Image();
        img.onload = ()=>{
          const maxDim = 1280;
          let w=img.width, h=img.height;
          if(w>maxDim || h>maxDim){ const ratio=Math.min(maxDim/w, maxDim/h); w=w*ratio; h=h*ratio; }
          const canvas = document.createElement("canvas");
          canvas.width=w; canvas.height=h;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img,0,0,w,h);
          const gpsVal = document.querySelector('[data-k="gps"]') ? document.querySelector('[data-k="gps"]').value : "";
          const now = new Date();
          const stamp = `${gpsVal||"Sin GPS"}  ·  ${now.toLocaleString("es-PE")}`;
          const barH = Math.max(24, h*0.05);
          ctx.fillStyle = "rgba(0,0,0,0.55)";
          ctx.fillRect(0, h-barH, w, barH);
          ctx.fillStyle = "#ffffff";
          ctx.font = `${Math.max(12,barH*0.42)}px sans-serif`;
          ctx.textBaseline = "middle";
          ctx.fillText(stamp, 8, h-barH/2);
          const finalDataUrl = canvas.toDataURL("image/jpeg", 0.8);
          newRecord[photoInput.dataset.k] = finalDataUrl;
          // también descargar una copia al dispositivo (galería/descargas)
          const dlLink = document.createElement("a");
          dlLink.href = finalDataUrl;
          dlLink.download = `evidencia_${slug(getCurrentPredio())}_${now.getTime()}.jpg`;
          dlLink.click();
          finishSave();
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(photoInput.files[0]);
    } else { finishSave(); }
  };
}
function closeModal(){ document.getElementById("modalArea").innerHTML=""; editingRecordId=null; }

/* ================= Configurar campos ================= */
function openFieldConfig(moduleId){
  const fields = getFields(moduleId);
  function draw(){
    const rows = fields.map((f,i)=>`
      <div class="cfg-row"><span>${f.l} <small style="color:var(--gray-500);">(${f.t})</small></span>
        <button data-idx="${i}" data-act="ren">Renombrar</button>
        <button data-idx="${i}" data-act="del" class="danger">Quitar</button>
      </div>`).join("");
    document.getElementById("modalArea").innerHTML = `
      <div class="modal-overlay" id="overlay">
        <div class="modal wide">
          <h3>Configurar campos</h3>
          <p class="modal-sub">${AREAS[currentArea].modules.find(x=>x.id===moduleId).name} · solo aplica a este predio</p>
          <div class="card">${rows}</div>
          <div class="card">
            <b>Agregar campo nuevo</b>
            <div class="field-grid" style="margin-top:8px;">
              <div class="field"><label>Etiqueta</label><input type="text" id="newFieldLabel" placeholder="Ej. N° de guía"></div>
              <div class="field"><label>Tipo</label>
                <select id="newFieldType">
                  <option value="text">Texto</option><option value="number">Número</option>
                  <option value="date">Fecha</option><option value="textarea">Texto largo</option>
                  <option value="select">Lista (opciones)</option>
                </select>
              </div>
              <div class="field full"><label>Opciones (solo lista, separadas por coma)</label><input type="text" id="newFieldOpts"></div>
            </div>
            <button class="primary" id="btnAddField" style="margin-top:8px;">+ Agregar campo</button>
          </div>
          <div class="modal-footer">
            <button id="btnResetFields">Restaurar campos originales</button>
            <button id="btnVolverCfg">← Volver</button>
          </div>
        </div>
      </div>`;
    document.getElementById("overlay").addEventListener("click", (e)=>{ if(e.target.id==="overlay") closeModal(); });
    document.getElementById("btnVolverCfg").onclick = ()=>{ closeModal(); renderAll(); };
    document.getElementById("btnResetFields").onclick = ()=>{
      if(confirm("Esto restaura los campos originales de este módulo. ¿Continuar?")){ resetFields(moduleId); closeModal(); renderAll(); }
    };
    document.getElementById("btnAddField").onclick = ()=>{
      const label = document.getElementById("newFieldLabel").value.trim();
      const type = document.getElementById("newFieldType").value;
      const optsRaw = document.getElementById("newFieldOpts").value.trim();
      if(!label){ alert("Escribe una etiqueta para el campo."); return; }
      const key = "custom_"+slug(label)+"_"+Math.random().toString(36).slice(2,5);
      const newField = {k:key, l:label, t:type};
      if(type==="select") newField.o = optsRaw.split(",").map(s=>s.trim()).filter(Boolean);
      fields.push(newField); setFields(moduleId, fields); draw();
    };
    document.querySelectorAll('[data-act="del"]').forEach(btn=>{
      btn.onclick = ()=>{ if(confirm("¿Quitar este campo del formulario? Los datos ya guardados no se borran.")){
        fields.splice(parseInt(btn.dataset.idx),1); setFields(moduleId, fields); draw(); } };
    });
    document.querySelectorAll('[data-act="ren"]').forEach(btn=>{
      btn.onclick = ()=>{ const idx=parseInt(btn.dataset.idx); const nuevo=prompt("Nueva etiqueta:", fields[idx].l);
        if(nuevo){ fields[idx].l=nuevo; setFields(moduleId, fields); draw(); } };
    });
  }
  draw();
}
</script>
<script>
/* ================= Agromapa (solo área Campo) ================= */
function renderAgromapa(main){
  const img = getAgromapaImg();
  const sectores = getSectores();
  main.innerHTML = `
    <div class="module-head"><div><h2>Agromapa</h2><p>Sube la imagen de tu predio y marca los sectores.</p></div>
    <div class="toolbar"><input type="file" id="agromapaFile" accept="image/*"><button id="btnIrAgriQuest">Diseñar / dibujar área con GPS real</button></div></div>
    <div class="card">
      ${img ? `<div class="mapwrap" id="mapWrap"><img src="${img}" id="mapImg">${sectores.map(s=>`<div class="pin" style="left:${s.x}%; top:${s.y}%;">${s.codigo}</div>`).join("")}</div>
      <p style="font-size:12px; color:var(--gray-500); margin-top:8px;">Toca la imagen para agregar un pin de sector.</p>`
      : `<div class="empty">Aún no subes la imagen de tu predio.</div>`}
    </div>
    <div class="card"><b>Sectores registrados</b><div style="margin-top:8px;">
      ${sectores.length===0 ? '<p style="font-size:12.5px; color:var(--gray-500);">Ninguno todavía.</p>' :
        sectores.map((s,i)=>`<div class="cfg-row"><span>${s.codigo} ${s.nota?"— "+s.nota:""}</span><button data-idx="${i}" class="danger">Quitar</button></div>`).join("")}
    </div></div>`;
  document.getElementById("btnIrAgriQuest").onclick = ()=>{ currentArea="agriquest"; currentModuleId="inicio"; renderAll(); };
  document.getElementById("agromapaFile").onchange = (e)=>{
    const file = e.target.files[0]; if(!file) return;
    const img2 = new Image(); const reader = new FileReader();
    reader.onload = (ev)=>{
      img2.onload = ()=>{
        const canvas = document.createElement("canvas");
        const maxDim = 1200; let w=img2.width, h=img2.height;
        if(w>maxDim || h>maxDim){ const ratio=Math.min(maxDim/w, maxDim/h); w=w*ratio; h=h*ratio; }
        canvas.width=w; canvas.height=h;
        canvas.getContext("2d").drawImage(img2,0,0,w,h);
        setAgromapaImg(canvas.toDataURL("image/jpeg",0.75));
        renderAgromapa(main);
      };
      img2.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };
  const mapImg = document.getElementById("mapImg");
  if(mapImg){
    mapImg.addEventListener("click",(e)=>{
      const rect = mapImg.getBoundingClientRect();
      const x = ((e.clientX-rect.left)/rect.width*100).toFixed(1);
      const y = ((e.clientY-rect.top)/rect.height*100).toFixed(1);
      const codigo = prompt("Código de sector (ej. EA-01):"); if(!codigo) return;
      const nota = prompt("Nota (opcional):")||"";
      const list = getSectores(); list.push({codigo, nota, x, y}); setSectores(list);
      renderAgromapa(main);
    });
  }
  main.querySelectorAll('.card button.danger').forEach(btn=>{
    btn.onclick = ()=>{ const list=getSectores(); list.splice(parseInt(btn.dataset.idx),1); setSectores(list); renderAgromapa(main); };
  });
}

/* ================= Documentos (con croquis por proceso) ================= */
function renderDocumentos(main){
  const docs = getDocs();
  main.innerHTML = `
    <div class="module-head"><div><h2>Documentos y croquis — ${AREAS[currentArea].label}</h2><p>Certificados, planos, croquis de planta, fotos, permisos.</p></div>
    <div class="toolbar"><button class="primary" id="btnUploadDoc">+ Subir archivo</button></div></div>
    <div class="card" id="docsList">
      ${docs.length===0 ? '<div class="empty">Aún no subes documentos.</div>' :
      docs.map((d,i)=>`<div class="doc-row"><div class="meta"><p class="name">${d.nombre}</p><p class="sub">${d.categoria||"Sin categoría"} · ${d.fecha||""} ${d.nota?"· "+d.nota:""}</p></div>
        <a href="${d.data}" download="${d.nombre}"><button>Descargar</button></a>
        <button data-idx="${i}" class="danger">Borrar</button></div>`).join("")}
    </div>`;
  document.getElementById("btnUploadDoc").onclick = ()=>{
    document.getElementById("modalArea").innerHTML = `
    <div class="modal-overlay" id="overlay"><div class="modal">
      <h3>Subir documento</h3>
      <div class="field-grid">
        <div class="field full"><label>Archivo</label><input type="file" id="docFile"></div>
        <div class="field"><label>Categoría</label><input type="text" id="docCat" placeholder="Ej. Certificación, Croquis de planta, Foto"></div>
        <div class="field"><label>Fecha</label><input type="date" id="docFecha" value="${todayISO()}"></div>
        <div class="field full"><label>Nota (opcional)</label><input type="text" id="docNota"></div>
      </div>
      <p style="font-size:11px; color:var(--gray-500); margin-top:8px;">Archivos grandes (más de ~2 MB) mejor guardarlos en tu Drive y anotar aquí solo la referencia.</p>
      <div class="modal-footer"><button id="btnVolverDoc">← Volver</button><button class="primary" id="btnSaveDoc">Guardar</button></div>
    </div></div>`;
    document.getElementById("btnVolverDoc").onclick = closeModal;
    document.getElementById("btnSaveDoc").onclick = ()=>{
      const file = document.getElementById("docFile").files[0];
      const categoria = document.getElementById("docCat").value;
      const fecha = document.getElementById("docFecha").value;
      const nota = document.getElementById("docNota").value;
      if(!file){ alert("Selecciona un archivo."); return; }
      if(file.size > 3*1024*1024){ if(!confirm("El archivo pesa más de 3 MB. ¿Continuar?")) return; }
      const reader = new FileReader();
      reader.onload = (ev)=>{
        const list = getDocs();
        list.push({nombre:file.name, categoria, fecha, nota, data:ev.target.result});
        try{ setDocs(list); }catch(e){ alert("Almacenamiento lleno. Borra documentos viejos."); return; }
        closeModal(); renderAll();
      };
      reader.readAsDataURL(file);
    };
  };
  main.querySelectorAll('#docsList button.danger').forEach(btn=>{
    btn.onclick = ()=>{ const list=getDocs(); list.splice(parseInt(btn.dataset.idx),1); setDocs(list); renderAll(); };
  });
}

/* ================= Historial de registros (cronológico, dentro del área actual) ================= */
function renderHistorialRegistros(main){
  let all = [];
  AREAS[currentArea].modules.forEach(m=>{
    getRecords(m.id).forEach(r=> all.push({modulo:m.name, fecha:r.fecha||"", resumen: resumenRegistro(r)}));
  });
  all.sort((a,b)=> (b.fecha||"").localeCompare(a.fecha||""));
  main.innerHTML = `
    <div class="module-head"><div><h2>Historial de registros — ${AREAS[currentArea].label}</h2><p>Todas las actividades de esta área, en orden cronológico.</p></div></div>
    <div class="filter-row"><input type="text" id="histSearch" placeholder="Buscar..."></div>
    <div id="histTable"></div>`;
  function draw(filter){
    let rows = all;
    if(filter) rows = rows.filter(r=> (r.modulo+" "+r.resumen).toLowerCase().includes(filter.toLowerCase()));
    document.getElementById("histTable").innerHTML = rows.length===0 ? '<div class="empty">Sin resultados.</div>' :
      `<div class="table-wrap"><table><thead><tr><th>Fecha</th><th>Módulo</th><th>Resumen</th></tr></thead><tbody>
      ${rows.map(r=>`<tr><td>${r.fecha}</td><td>${r.modulo}</td><td>${r.resumen}</td></tr>`).join("")}
      </tbody></table></div>`;
  }
  draw("");
  document.getElementById("histSearch").oninput = (e)=> draw(e.target.value);
}
function resumenRegistro(r){
  const parts = [];
  if(r.cultivo) parts.push(r.cultivo);
  if(r.sector) parts.push("sector "+r.sector);
  if(r.lote) parts.push("lote "+r.lote);
  if(r.producto) parts.push(r.producto);
  if(r.tipo_plaga) parts.push(r.tipo_plaga);
  if(r.nombres) parts.push(r.nombres);
  if(r.tecnico) parts.push(r.tecnico);
  return parts.join(" · ") || "—";
}

/* ================= Historial de campo por años (redacción libre, exportable a Word) ================= */
function renderHistorialCampo(main){
  const years = []; const nowY = new Date().getFullYear();
  for(let y=nowY; y>=nowY-6; y--) years.push(y);
  let selectedYear = nowY;
  function draw(){
    main.innerHTML = `
      <div class="module-head"><div><h2>Historial de campo (por años)</h2><p>Redacción libre de la evolución del fundo, año por año — útil para trazabilidad histórica ante SENASA.</p></div>
      <div class="toolbar"><button id="btnExportWord">Descargar en Word</button></div></div>
      <div class="year-tabs">${years.map(y=>`<button data-y="${y}" class="${y===selectedYear?"active":""}">${y}</button>`).join("")}</div>
      <div class="card"><textarea id="histText" rows="16" style="font-family:inherit;">${getHistorial(selectedYear)}</textarea>
      <div class="modal-footer"><button class="primary" id="btnSaveHist">Guardar año ${selectedYear}</button></div></div>`;
    main.querySelectorAll(".year-tabs button").forEach(btn=>{
      btn.onclick = ()=>{ selectedYear = parseInt(btn.dataset.y); draw(); };
    });
    document.getElementById("btnSaveHist").onclick = ()=>{
      setHistorial(selectedYear, document.getElementById("histText").value);
      alert("Historial de "+selectedYear+" guardado.");
    };
    document.getElementById("btnExportWord").onclick = ()=>{
      let body = `<h1>Historial de campo — ${getCurrentPredio()}</h1>`;
      years.slice().reverse().forEach(y=>{
        const txt = getHistorial(y);
        if(txt.trim()){ body += `<h2>${y}</h2><p>${txt.replace(/\n/g,"<br>")}</p>`; }
      });
      const htmlDoc = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
        <head><meta charset="utf-8"><title>Historial de campo</title></head><body>${body}</body></html>`;
      const blob = new Blob(['\ufeff', htmlDoc], {type:"application/msword"});
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `${getCurrentPredio()}_Historial_de_Campo.doc`;
      link.click();
    };
  }
  draw();
}
</script>

/* ================= Respaldo / restauración (todas las áreas) ================= */
document.getElementById("btnBackup").onclick = ()=>{
  const data = {predio:getCurrentPredio(), profile:getPredioProfile(getCurrentPredio()), areas:{}, sectores:getSectores(), agromapaImg:getAgromapaImg(), docs:{}, historial:{}};
  AREA_ORDER.forEach(areaId=>{
    const savedArea = currentArea; currentArea = areaId;
    data.areas[areaId] = {modules:{}, fieldOverrides:{}};
    AREAS[areaId].modules.forEach(m=>{
      data.areas[areaId].modules[m.id] = getRecords(m.id);
      const ov = localStorage.getItem(pKey(areaId+"_fields_"+m.id));
      if(ov) data.areas[areaId].fieldOverrides[m.id] = JSON.parse(ov);
    });
    data.docs[areaId] = getDocs();
    currentArea = savedArea;
  });
  for(let y=new Date().getFullYear(); y>=new Date().getFullYear()-6; y--){ const t=getHistorial(y); if(t) data.historial[y]=t; }
  const blob = new Blob([JSON.stringify(data)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href=url; a.download = `respaldo_${slug(getCurrentPredio())}.json`; a.click();
  URL.revokeObjectURL(url);
};
document.getElementById("btnRestore").onclick = ()=> document.getElementById("fileRestore").click();
document.getElementById("fileRestore").onchange = (e)=>{
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = (evt)=>{
    try{
      const data = JSON.parse(evt.target.result);
      if(data.predio && !getPredios().includes(data.predio)){ const p=getPredios(); p.push(data.predio); setPredios(p); }
      if(data.predio) setCurrentPredio(data.predio);
      if(data.profile) setPredioProfile(data.predio, data.profile);
      Object.keys(data.areas||{}).forEach(areaId=>{
        const savedArea = currentArea; currentArea = areaId;
        const a = data.areas[areaId];
        Object.keys(a.modules||{}).forEach(mid=> saveRecords(mid, a.modules[mid]));
        Object.keys(a.fieldOverrides||{}).forEach(mid=> setFields(mid, a.fieldOverrides[mid]));
        if(data.docs && data.docs[areaId]) setDocs(data.docs[areaId]);
        currentArea = savedArea;
      });
      if(data.sectores) setSectores(data.sectores);
      if(data.agromapaImg) setAgromapaImg(data.agromapaImg);
      Object.keys(data.historial||{}).forEach(y=> setHistorial(y, data.historial[y]));
      renderAll();
      alert("Respaldo importado correctamente.");
    }catch(err){ alert("El archivo no es un respaldo válido."); console.error(err); }
  };
  reader.readAsText(file);
};

  if(!panel){ panel=document.createElement("div"); panel.className="voice-panel"; panel.id="voicePanel"; document.body.appendChild(panel); }

function buildModuleKeywords(){

    "campo::prep_fert": ["prepare fertilizante","prepare abono","preparacion de fertilizante"],

    "campo::desmalezado": ["desmalec","desmalez","maleza"],
    "campo::poda": ["pode","pod","sombra"],
    "campo::plagas": ["plaga","enferm","fumigu","fumig","monilia","control fitosanitario"],
    "campo::cosecha": ["cosech","desgran","envi","vend"],
    "campo::trazabilidad": ["trazabilidad"],
    "campo::limpieza_equipos": ["herramienta","equipo","mantenimiento de equipo","mantenimiento de herramienta"],
    "campo::limpieza_infra": ["limpieza de infraestructura","limpie el almacen","limpie la infraestructura"],
    "campo::compras": ["compr","insumo"],
    "campo::agua": ["agua de riego","riego","calidad de agua"],
    "campo::residuos": ["envase","residuo","basura"],
    "campo::asistencia": ["asistencia","capacitacion","visita","charla de capacitacion"],
    "campo::seguridad": ["seguridad y salud","charla de seguridad","salud ocupacional"],
    "primario::pp_recepcion": ["recepcion de materia","recibi baba","recibi mazorca"],
    "primario::pp_fermentacion": ["ferment"],
    "primario::pp_secado": ["secad","secando","seque"],
    "primario::pp_seleccion": ["seleccion","clasific"],
    "primario::pp_almacenamiento": ["almacen"],
    "primario::pp_limpieza": ["limpieza de planta","poes","saneamiento"],
    "primario::pp_plagas_almacen": ["plaga en almacen","control de plagas en almacen"],
    "transformacion::tr_recepcion": ["recepcion de grano"],
    "transformacion::tr_tostado": ["tost"],
    "transformacion::tr_molienda": ["molienda","descascarill","molí","moli"],
    "transformacion::tr_conchado": ["conchad","refinad"],

    "agritec::at_visita": ["visita tecnica","visita al agricultor","asistencia tecnica"]
  };
}
function detectAreaAndModule(transcript){
  const t = normTxt(transcript);
  const kw = buildModuleKeywords();
  let best=null, bestScore=0;
  Object.keys(kw).forEach(key=>{
    let score=0;
    kw[key].forEach(w=>{ if(w.length>3 && t.includes(w)) score += w.trim().split(/\s+/).length; });
    if(score>bestScore){ bestScore=score; best=key; }
  });
  if(!best) return null;
  const [areaId, moduleId] = best.split("::");
  return {areaId, moduleId};
}
function extractFields(areaId, moduleId, transcript){
  const t = normTxt(transcript);
  const savedArea = currentArea; currentArea = areaId;
  const fields = getFields(moduleId);
  let rec = {};
  fields.forEach(f=>{
    if(f.k==="fecha"){
      if(t.includes("hoy")) rec.fecha = todayISO();
      else if(t.includes("ayer")){ const d=new Date(); d.setDate(d.getDate()-1); rec.fecha=d.toISOString().slice(0,10); }
    } else if(f.t==="select" && f.o){
      const found = f.o.find(o=> t.includes(normTxt(o)));
      if(found) rec[f.k]=found;
    } else if(f.k==="sector"){
      const sectores = getSectores();
      const found = sectores.find(s=> t.includes(normTxt(s.codigo)));
      if(found) rec.sector = found.codigo;
      else{ const m2 = t.match(/\b([a-z]{1,3}-?\d{1,3})\b/i); if(m2) rec.sector = m2[1].toUpperCase(); }
    } else if(f.k==="lote"){
      const m2 = t.match(/lote\s+([a-z0-9\-]+)/i); if(m2) rec.lote = m2[1].toUpperCase();
    }
  });
  currentArea = savedArea;
  return rec;
}
function camposClave(areaId, moduleId){
  const savedArea = currentArea; currentArea = areaId;
  const fields = getFields(moduleId);
  const claves = ["fecha"];
  if(fields.some(f=>f.k==="sector")) claves.push("sector");
  else if(fields.some(f=>f.k==="lote")) claves.push("lote");
  currentArea = savedArea;
  return claves;
}
function startVoiceFlow(){
  if(!recognition){ alert("Tu navegador no soporta reconocimiento de voz. Usa Chrome."); return; }
  const btn = document.getElementById("voiceBtn");
  btn.classList.add("listening");
  showVoicePanel("Escuchando… cuenta qué actividad hiciste (de cualquiera de las áreas).");
  recognition.onresult = (event)=>{
    const transcript = event.results[0][0].transcript;
    btn.classList.remove("listening");
    const found = detectAreaAndModule(transcript);
    if(!found){
      const msg = `No identifiqué el módulo en lo que dijiste. Elige el módulo manualmente en el menú y usa nuevo registro.`;
      showVoicePanel(`No identifiqué el módulo en: "${transcript}". Elige manualmente.`);
      speak(msg);
      setTimeout(hideVoicePanel,6000);
      return;
    }
    const rec = extractFields(found.areaId, found.moduleId, transcript);
    resolveMissing(found.areaId, found.moduleId, rec, camposClave(found.areaId, found.moduleId), 0);
  };
  recognition.onerror = ()=>{ btn.classList.remove("listening"); showVoicePanel("No logré escucharte, intenta de nuevo."); setTimeout(hideVoicePanel,3000); };
  recognition.onend = ()=>{ btn.classList.remove("listening"); };
  recognition.start();
}
function resolveMissing(areaId, moduleId, rec, claves, roundCount){
  const faltante = claves.find(k=> !rec[k]);
  const savedArea = currentArea; currentArea = areaId;
  const modName = AREAS[areaId].modules.find(x=>x.id===moduleId).name;
  if(!faltante || roundCount>=3){
    hideVoicePanel();
    currentArea = areaId; currentModuleId = moduleId; renderAll();
    openModal(moduleId, null, rec);
    return;
  }
  const label = getFields(moduleId).find(f=>f.k===faltante)?.l || faltante;
  currentArea = savedArea;
  const pregunta = `Para ${modName}, falta indicar ${label}. ¿Cuál fue?`;
  showVoicePanel(pregunta); speak(pregunta);
  recognition.onresult = (event)=>{
    const answer = event.results[0][0].transcript.toLowerCase();
    if(faltante==="fecha"){
      if(answer.includes("hoy")) rec.fecha = todayISO();
      else if(answer.includes("ayer")){ const d=new Date(); d.setDate(d.getDate()-1); rec.fecha=d.toISOString().slice(0,10); }
      else rec.fecha = todayISO();
    } else { rec[faltante] = answer.toUpperCase().trim(); }
    resolveMissing(areaId, moduleId, rec, claves, roundCount+1);
  };
  recognition.onerror = ()=>{ resolveMissing(areaId, moduleId, rec, claves, roundCount+1); };
  setTimeout(()=>{ try{ recognition.start(); }catch(e){} }, 900);
}
document.getElementById("voiceBtn").onclick = startVoiceFlow;

function getWaypoints(){ return JSON.parse(localStorage.getItem(pKey("aq_waypoints"))||"[]"); }
function setWaypoints(list){ localStorage.setItem(pKey("aq_waypoints"), JSON.stringify(list)); }
function getAreas(){ return JSON.parse(localStorage.getItem(pKey("aq_areas"))||"[]"); }
function setAreasAQ(list){ localStorage.setItem(pKey("aq_areas"), JSON.stringify(list)); }

function calcPolygonHa(latlngs){
  if(latlngs.length<3) return 0;
  const R = 6371000;
  const lat0 = latlngs.reduce((a,p)=>a+p[0],0)/latlngs.length * Math.PI/180;
  const pts = latlngs.map(p=>{
    const x = R * (p[1]*Math.PI/180) * Math.cos(lat0);
    const y = R * (p[0]*Math.PI/180);
    return [x,y];
  });
  let area = 0;
  for(let i=0;i<pts.length;i++){
    const [x1,y1]=pts[i]; const [x2,y2]=pts[(i+1)%pts.length];
    area += x1*y2 - x2*y1;
  }
  return Math.abs(area/2)/10000; // hectáreas
}

let aqMap=null, aqDrawing=false, aqDrawPoints=[], aqDrawLayer=null, aqMarkersLayer=null, aqUserMarker=null;

function renderAgriQuest(main){
  main.innerHTML = `
    <div class="module-head"><div><h2>AGRIQUEST</h2><p>Mapa satelital y mapa con límites administrativos, ubicación GPS en tiempo real, dibujo de áreas, puntos de interés y clima para tus actividades de campo.</p></div></div>
    <p style="font-size:11.5px; color:var(--gray-500); margin:-8px 0 10px;">Nota: la nitidez del satélite depende de lo que el proveedor gratuito tenga fotografiado en esta zona — en el VRAEM puede verse con menos detalle que en una ciudad. Usa el control de capas (arriba a la derecha del mapa) para alternar a "Mapa" y ver límites y nombres de lugares.</p>
    <div id="weatherPanel" class="card"><p style="font-size:12.5px; color:var(--gray-500);">Obteniendo clima de tu ubicación...</p></div>
    <div class="aq-toolbar">
      <button id="btnAqLocate">Centrar en mi ubicación</button>
      <button id="btnAqDraw">Dibujar área</button>
      <button id="btnAqWaypoint">Guardar punto de interés</button>
    </div>
    <div id="aqMap"></div>
    <div class="card" style="margin-top:12px;">
      <b>Áreas dibujadas</b>
      <div class="aq-list" id="aqAreasList"></div>
    </div>
    <div class="card">
      <b>Puntos de interés</b>
      <div class="aq-list" id="aqWaypointsList"></div>
    </div>`;

  setTimeout(()=> initAqMap(), 50);
  renderAqLists();
  loadWeather();
}

function initAqMap(){
  if(aqMap){ aqMap.remove(); aqMap=null; }
  aqMap = L.map('aqMap').setView([-12.63, -73.77], 14); // VRAEM aprox, se recentra con GPS real

  const satelite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Esri World Imagery', maxZoom: 19
  });
  const mapaLimites = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: 'OpenStreetMap — incluye límites distritales/provinciales/país', maxZoom: 19
  });
  satelite.addTo(aqMap);
  L.control.layers({"Satélite": satelite, "Mapa (límites y nombres)": mapaLimites}, {}, {position:'topright'}).addTo(aqMap);

  aqMarkersLayer = L.layerGroup().addTo(aqMap);
  drawSavedAreas();
  drawSavedWaypoints();
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      const ll = [pos.coords.latitude, pos.coords.longitude];
      aqMap.setView(ll, 16);
      if(aqUserMarker) aqMap.removeLayer(aqUserMarker);
      aqUserMarker = L.circleMarker(ll, {radius:8, color:"#2b5f8a", fillColor:"#2b5f8a", fillOpacity:0.8}).addTo(aqMap).bindPopup("Tu ubicación actual");
      loadWeather(ll[0], ll[1]);
    }, ()=>{}, {enableHighAccuracy:true});
  }
  aqMap.on('click', onAqMapClick);
}

function onAqMapClick(e){
  if(!aqDrawing) return;
  aqDrawPoints.push([e.latlng.lat, e.latlng.lng]);
  if(aqDrawLayer) aqMap.removeLayer(aqDrawLayer);
  aqDrawLayer = L.polygon(aqDrawPoints, {color:"#3a7247"}).addTo(aqMap);
}

document.addEventListener("click", (e)=>{
  if(e.target && e.target.id==="btnAqDraw"){
    if(!aqDrawing){
      aqDrawing = true; aqDrawPoints=[];
      e.target.textContent = "Terminar y calcular área";
    } else {
      aqDrawing = false;
      e.target.textContent = "Dibujar área";
      if(aqDrawPoints.length>=3){
        const ha = calcPolygonHa(aqDrawPoints);
        const nombre = prompt("Nombre para esta área (ej. Sector nuevo):", "Área "+(getAreas().length+1));
        if(nombre){
          const list = getAreas();
          list.push({nombre, ha: ha.toFixed(2), puntos: aqDrawPoints, fecha: todayISO()});
          setAreasAQ(list);
          renderAqLists();
        }
      }
      aqDrawPoints=[];
      if(aqDrawLayer){ aqMap.removeLayer(aqDrawLayer); aqDrawLayer=null; }
      drawSavedAreas();
    }
  }
  if(e.target && e.target.id==="btnAqLocate"){
    if(navigator.geolocation){
      navigator.geolocation.getCurrentPosition(pos=>{
        const ll=[pos.coords.latitude,pos.coords.longitude];
        aqMap.setView(ll,17);
        if(aqUserMarker) aqMap.removeLayer(aqUserMarker);
        aqUserMarker = L.circleMarker(ll, {radius:8, color:"#2b5f8a", fillColor:"#2b5f8a", fillOpacity:0.8}).addTo(aqMap).bindPopup("Tu ubicación actual").openPopup();
        loadWeather(ll[0], ll[1]);
      }, err=> alert("No se pudo obtener tu ubicación: "+err.message));
    }
  }
  if(e.target && e.target.id==="btnAqWaypoint"){
    if(!navigator.geolocation){ alert("Tu navegador no soporta GPS."); return; }
    navigator.geolocation.getCurrentPosition(pos=>{
      const nombre = prompt("Nombre del punto de interés:", "Punto "+(getWaypoints().length+1));
      if(!nombre) return;
      const tipoOpciones = "1) Potencial productivo\n2) Potencial agroturístico\n3) Visita técnica\n4) Otro";
      let tipoNum = prompt("Tipo de punto:\n"+tipoOpciones, "1");
      const tipos = {"1":"Potencial productivo","2":"Potencial agroturístico","3":"Visita técnica","4":"Otro"};
      const tipo = tipos[tipoNum] || "Otro";
      const list = getWaypoints();
      list.push({nombre, tipo, lat:pos.coords.latitude, lng:pos.coords.longitude, fecha: todayISO()});
      setWaypoints(list);
      renderAqLists();
      drawSavedWaypoints();
    }, err=> alert("No se pudo obtener tu ubicación: "+err.message));
  }
});

function drawSavedAreas(){
  if(!aqMap) return;
  getAreas().forEach(a=>{
    L.polygon(a.puntos, {color:"#3a7247"}).addTo(aqMap).bindPopup(`${a.nombre} — ${a.ha} ha`);
  });
}
function drawSavedWaypoints(){
  if(!aqMarkersLayer) return;
  aqMarkersLayer.clearLayers();
  getWaypoints().forEach(w=>{
    L.marker([w.lat,w.lng]).addTo(aqMarkersLayer).bindPopup(`${w.nombre} ${w.tipo?"("+w.tipo+")":""}<br>${w.lat.toFixed(5)}, ${w.lng.toFixed(5)}`);
  });
}
function renderAqLists(){
  const aList = document.getElementById("aqAreasList");
  const wList = document.getElementById("aqWaypointsList");
  if(aList){
    const areas = getAreas();
    aList.innerHTML = areas.length===0 ? '<p style="font-size:12.5px; color:var(--gray-500);">Ninguna todavía.</p>' :
      areas.map((a,i)=>`<div class="cfg-row"><span>${a.nombre} — ${a.ha} ha (${a.fecha})</span><button data-i="${i}" class="danger" data-t="area">Borrar</button></div>`).join("");
  }
  if(wList){
    const wps = getWaypoints();
    wList.innerHTML = wps.length===0 ? '<p style="font-size:12.5px; color:var(--gray-500);">Ninguno todavía.</p>' :
      wps.map((w,i)=>`<div class="cfg-row"><span>${w.nombre} ${w.tipo?"— <b>"+w.tipo+"</b>":""} (${w.lat.toFixed(5)}, ${w.lng.toFixed(5)})</span><button data-i="${i}" class="danger" data-t="wp">Borrar</button></div>`).join("");
  }
  document.querySelectorAll('button[data-t="area"]').forEach(btn=>{
    btn.onclick = ()=>{ const l=getAreas(); l.splice(parseInt(btn.dataset.i),1); setAreasAQ(l); renderAqLists(); initAqMap(); };
  });
  document.querySelectorAll('button[data-t="wp"]').forEach(btn=>{
    btn.onclick = ()=>{ const l=getWaypoints(); l.splice(parseInt(btn.dataset.i),1); setWaypoints(l); renderAqLists(); drawSavedWaypoints(); };
  });
}

/* ---- Clima vía Open-Meteo (gratis, sin clave) ---- */
function loadWeather(lat, lng){
  const panel = document.getElementById("weatherPanel");
  if(!panel) return;
  function fetchFor(lat, lng){
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,wind_speed_10m,precipitation&daily=sunrise,sunset,precipitation_probability_max&timezone=auto`)
      .then(r=>r.json())
      .then(d=>{
        const t = d.current.temperature_2m;
        const wind = d.current.wind_speed_10m;
        const precip = d.current.precipitation;
        const probLluvia = d.daily.precipitation_probability_max[0];
        const sunrise = d.daily.sunrise[0].split("T")[1];
        const sunset = d.daily.sunset[0].split("T")[1];
        const recomendado = (wind < 12 && probLluvia < 40);
        panel.innerHTML = `
          <div class="weather-grid">
            <div class="weather-card"><div class="l">Temperatura</div><div class="v">${t}°C</div></div>
            <div class="weather-card"><div class="l">Viento</div><div class="v">${wind} km/h</div></div>
            <div class="weather-card"><div class="l">Prob. lluvia hoy</div><div class="v">${probLluvia}%</div></div>
            <div class="weather-card"><div class="l">Amanecer / Atardecer</div><div class="v" style="font-size:13px;">${sunrise} - ${sunset}</div></div>
          </div>
          <div><b style="font-size:12.5px;">Ventana de pulverización: ${recomendado?"Recomendado":"No recomendado"}</b>
          <div class="spray-bar"></div>
          <p style="font-size:11px; color:var(--gray-500);">Referencial: evalúa viento bajo y baja probabilidad de lluvia. No reemplaza el criterio técnico ni la etiqueta del producto.</p></div>`;
      }).catch(()=>{ panel.innerHTML = '<p style="font-size:12.5px; color:var(--gray-500);">No se pudo obtener el clima (revisa tu conexión).</p>'; });
  }
  if(lat && lng){ fetchFor(lat,lng); return; }
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=> fetchFor(pos.coords.latitude, pos.coords.longitude),
      ()=> fetchFor(-12.63,-73.77));
  } else fetchFor(-12.63,-73.77);
}
</script>
